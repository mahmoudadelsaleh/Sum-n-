<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر محمود عادل - الإصدار النهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Times New Roman', serif; overflow: hidden; }
        #ui-layer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(15, 15, 15, 0.95);
            padding: 15px; border-top: 2px solid #00d4ff;
            border-radius: 25px 25px 0 0; z-index: 100; text-align: center;
            box-sizing: border-box;
        }
        .math-header { font-size: 1.4rem; color: #ffcc00; margin-bottom: 5px; direction: ltr; font-weight: bold; }
        .substitution { font-size: 1.1rem; color: #00d4ff; margin: 5px 0; direction: ltr; font-family: 'Courier New', monospace; }
        .controls-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: none; background: #00d4ff; color: #000; font-size: 22px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-action { padding: 10px 20px; border-radius: 20px; border: 1.5px solid #ff9f43; background: transparent; color: #ff9f43; cursor: pointer; font-family: 'Segoe UI'; font-weight: bold; font-size: 0.9rem; }
        .btn-play-pause { background: #ff9f43; color: #000; border: none; }
        #n-val { font-family: sans-serif; font-size: 1.5rem; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="formula-box" class="math-header"></div>
    <div id="sub-box" class="substitution"></div>
    
    <div class="controls-row">
        <button class="btn-circle" onclick="updateN(-1)">-</button>
        <div id="n-info">n = <span id="n-val">4</span></div>
        <button class="btn-circle" onclick="updateN(1)">+</button>
        <button id="playPauseBtn" class="btn-circle btn-play-pause" onclick="toggleRotation()">⏸</button>
    </div>
    
    <div class="controls-row">
        <button class="btn-action" onclick="toggleMode()">تبديل النمط (منفصل/متصل)</button>
    </div>
</div>

<script>
    let n = 4;
    let discreteMode = false;
    let isRotating = true;
    let scene, camera, renderer, controls, mainGroup;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 25, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 7, 0);

        mainGroup = new THREE.Group();
        scene.add(mainGroup);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const pLight = new THREE.PointLight(0xffffff, 1);
        pLight.position.set(30, 40, 30);
        scene.add(pLight);

        draw();
    }

    function createLabel(text, x, y, z, color, size = 45) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 128;
        ctx.fillStyle = color;
        ctx.font = `bold ${size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(text, 128, 80);
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
        sprite.position.set(x, y, z);
        sprite.scale.set(4, 2, 1);
        return sprite;
    }

    function draw() {
        mainGroup.clear();
        const res = (n * (n + 1) * (2 * n + 1)) / 6;

        if (discreteMode) {
            document.getElementById('formula-box').innerHTML = "&sum; i&sup2; = 1&sup2; + 2&sup2; + ... + n&sup2;";
            document.getElementById('sub-box').innerHTML = `Value = ${res}`;
            
            for (let i = 1; i <= n; i++) {
                const boxGeo = new THREE.BoxGeometry(i, i, 1); // القاعدة على xy والارتفاع سمك الوحدة
                const cube = new THREE.Mesh(boxGeo, new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(0.55, 0.7, 0.2 + (i/n)*0.5) }));
                cube.position.z = (n - i) + 0.5; // الرص على محور z
                cube.add(createLabel(`${i*i}`, 0, -i/2 - 0.5, 0, "#ffffff"));
                cube.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), new THREE.LineBasicMaterial({color: 0xffffff, opacity: 0.3, transparent: true})));
                mainGroup.add(cube);
            }
        } else {
            // الرؤية المطلوبة: z هو الرأسي (الارتفاع)
            document.getElementById('formula-box').innerHTML = "V = &frac16; |x<sub>A</sub>| . |y<sub>B</sub>| . |z<sub>C</sub>|";
            document.getElementById('sub-box').innerHTML = `V = &frac16; |${n}| . |${n+1}| . |${2*n+1}| = ${res}`;

            const axisMax = Math.max(n, 2*n+1) + 5;
            const addAxis = (vec, col) => {
                const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), vec]);
                mainGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({color: col})));
            };
            // في Three.js المحور الرأسي هو Y افتراضياً، سنقوم ببرمجة المشهد ليكون Z هو الرأسي بصرياً
            addAxis(new THREE.Vector3(axisMax, 0, 0), 0xff4444); // x
            addAxis(new THREE.Vector3(0, axisMax, 0), 0x4444ff); // y
            addAxis(new THREE.Vector3(0, 0, axisMax), 0x44ff44); // z الأساسي (الرأسي)

            // الإحداثيات: A(n,0,0), B(0,n+1,0), C(0,0,2n+1)
            const geo = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                0,0,0,  n,0,0,  0,n+1,0,         // القاعدة xy
                0,0,0,  0,n+1,0,  0,0,2*n+1,     // الوجه yz
                0,0,0,  0,0,2*n+1,  n,0,0,       // الوجه xz
                n,0,0,  0,n+1,0,  0,0,2*n+1      // الوجه ABC
            ]);
            geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geo.computeVertexNormals();
            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color: 0x00d4ff, transparent: true, opacity: 0.5, side: THREE.DoubleSide}));
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color: 0x00d4ff})));
            mainGroup.add(mesh);

            // تسمية النقاط
            mainGroup.add(createLabel(`A(${n},0,0)`, n, 0, 0, "#ff4444"));
            mainGroup.add(createLabel(`B(0,${n+1},0)`, 0, n+1, 0, "#4444ff"));
            mainGroup.add(createLabel(`C(0,0,${2*n+1})`, 0, 0, 2*n+1, "#44ff44"));
            mainGroup.add(createLabel(`O(0,0,0)`, -1, -1, 0, "#ffffff", 30));
        }
        document.getElementById('n-val').innerText = n;
    }

    function updateN(v) { n = Math.max(1, Math.min(12, n + v)); draw(); }
    function toggleMode() { discreteMode = !discreteMode; draw(); }
    
    function toggleRotation() {
        isRotating = !isRotating;
        document.getElementById('playPauseBtn').innerText = isRotating ? "⏸" : "▶️";
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isRotating) {
            mainGroup.rotation.z += 0.005; // الدوران حول المحور الرأسي z
        }
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
