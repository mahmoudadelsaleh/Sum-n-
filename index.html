<!DOCTYPE html>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}body{background:#02050a;font-family:system-ui,sans-serif;height:100vh;width:100vw;display:flex;flex-direction:column;overflow:hidden}.header{flex-shrink:0;padding:5px;text-align:center}.math-panel{background:rgba(10,20,35,.95);backdrop-filter:blur(10px);display:inline-block;padding:8px 18px;border-radius:15px;border:1px solid rgba(255,215,0,.4);box-shadow:0 10px 30px rgba(0,0,0,.5)}#math-formula-block{font-size:.85rem;color:#f5e6b0}.canvas-container{flex:1;position:relative;margin:0 5px;border-radius:20px;overflow:hidden;background:radial-gradient(circle at center,#0a111f 0,#02050a 100%);border:1px solid rgba(255,255,255,.05)}#canvas3d{width:100%;height:100%;display:block}.footer-bar{flex-shrink:0;background:#080d1a;border-top:1px solid #1a253a;z-index:100;padding-bottom:25px}.controls{display:flex;gap:12px;justify-content:center;align-items:center;padding:20px 5px 10px 5px}button{background:#162235;border:1px solid #2c3e50;color:#ffd700;border-radius:12px;min-width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,.3);transition:all .2s}button:disabled{opacity:.2}button:active{transform:scale(.9)}.btn-action{background:linear-gradient(135deg,#ffd700,#daa520);color:#000;border:none}.n-value{color:#fff;font-size:1rem;min-width:50px;text-align:center;font-weight:900}.safe-area-buffer{height:15px;background:#080d1a}.watermark{position:absolute;bottom:12px;left:15px;color:rgba(255,215,0,.3);font-size:.65rem;pointer-events:none}
    </style>
</head>
<body>
    <div class="header"><div class="math-panel"><div id="math-formula-block"></div></div></div>
    <div class="canvas-container"><canvas id="canvas3d"></canvas><div class="watermark">E-Learning Studio | <b>Mr. Mahmoud Adel</b></div></div>
    <div class="footer-bar"><div class="controls"><button id="btn-minus">n-</button><div class="n-value" id="n-value">n=4</div><button id="btn-plus">n+</button><button id="distribute-btn" class="btn-action"><svg id="action-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg></button><button id="reset-view-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button></div><div class="safe-area-buffer"></div></div>
    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.152.2/build/three.module.js","three/addons/":"https://unpkg.com/three@0.152.2/examples/jsm/"}}</script>
    <script type="module">
        import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';let scene,camera,renderer,controls,mainGroup,gridHelper,n=4,allCubes=[],STEP=1,isAnimating=!1,isDistributed=!1;function updateMathFormula(){const e=(n*(n+1))/2,t=Math.pow(e,2),o=document.getElementById("math-formula-block");o.innerHTML=`$$\\small \\sum_{i=1}^{${n}} i^3 = \\left( \\sum_{i=1}^{${n}} i \\right)^2 = ${e}^2 = ${t}$$`,window.MathJax&&MathJax.typesetPromise([o])}function initScene(){const e=document.getElementById("canvas3d");scene=new THREE.Scene,camera=new THREE.PerspectiveCamera(40,e.clientWidth/e.clientHeight,.1,1e3),renderer=new THREE.WebGLRenderer({canvas:e,antialias:!0,alpha:!0}),renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)),renderer.toneMapping=THREE.ReinhardToneMapping,controls=new OrbitControls(camera,e),controls.enableDamping=!0,scene.add(new THREE.AmbientLight(16777215,.5));const t=new THREE.DirectionalLight(16777215,1);t.position.set(10,25,15),scene.add(t),mainGroup=new THREE.Group,scene.add(mainGroup),rebuild(),resetCam(),updateIcon(),renderer.setAnimationLoop(()=>{controls.update(),renderer.render(scene,camera)})}function updateGrid(){gridHelper&&scene.remove(gridHelper);const e=(n*(n+1))/2;gridHelper=new THREE.GridHelper(2*e,e,16766720,1118481),gridHelper.position.set(e*STEP/2-.5,-.52,e*STEP/2-.5),gridHelper.material.opacity=.15,gridHelper.material.transparent=!0,scene.add(gridHelper)}function rebuild(){if(isAnimating)return;for(;mainGroup.children.length;)mainGroup.remove(mainGroup.children[0]);allCubes=[],isDistributed=!1,updateIcon();const e=(n*(n+1))/2,t=Array(e).fill().map(()=>Array(e).fill(!1));for(let o=1;o<=n;o++){let r=o*(o-1)/2,a=o*137.5%360;for(let e=0;e<o;e++)for(let n=0;n<o;n++)t[r+e][r+n]=!0;for(let l=0;l<o;l++)for(let s=0;s<o;s++)for(let i=0;i<o;i++){const d=new THREE.MeshPhysicalMaterial({color:new THREE.Color(`hsl(${a}, 85%, 55%)`),metalness:.15,roughness:.25,clearcoat:1}),c=new THREE.Mesh(new THREE.BoxGeometry(.95,.95,.95),d),m=new THREE.EdgesGeometry(c.geometry),u=new THREE.LineSegments(m,new THREE.LineBasicMaterial({color:16777215,transparent:!0,opacity:.15}));c.add(u);const g=(r+s)*STEP,p=l*STEP,h=(r+i)*STEP;let v=g,y=h;if(l>0){const e=o*(o+1)/2;let t=!1;for(let n=0;n<e&&!t;n++)for(let o=0;o<e&&!t;o++)t||globalUsed[o][n]||(t=!0,v=o*STEP,y=n*STEP)}c.position.set(g,p,h),c.userData={orig:new THREE.Vector3(g,p,h),target:new THREE.Vector3(v,0,y),towerId:o},mainGroup.add(c),allCubes.push(c)}}updateMathFormula(),updateGrid();const o=(n*(n+1))/2;controls.target.set(o*STEP/2,0,o*STEP/2)}async function toggleAction(){if(isAnimating)return;isAnimating=!0;const e=document.getElementById("distribute-btn");e.disabled=!0;if(isDistributed){allCubes.forEach(e=>{gsap.to(e.position,{x:e.userData.orig.x,y:e.userData.orig.y,z:e.userData.orig.z,duration:1.1,ease:"back.inOut(1.1)",delay:.3*Math.random()})}),await new Promise(e=>setTimeout(e,1500)),isDistributed=!1}else{for(let e=1;e<=n;e++){const t=allCubes.filter(t=>t.userData.towerId===e);t.forEach(e=>{gsap.to(e.position,{x:e.userData.target.x,y:e.userData.target.y,z:e.userData.target.z,duration:.9,ease:"power3.inOut"})}),await new Promise(e=>setTimeout(e,350))}isDistributed=!0}updateIcon(),isAnimating=!1,e.disabled=!1}function updateIcon(){const e=document.getElementById("action-icon");isDistributed?e.innerHTML='<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>':e.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>'}function resetCam(){const e=(n*(n+1))/2;gsap.to(camera.position,{x:2.6*e,y:2*e,z:2.6*e,duration:1.5,ease:"power2.out"}),gsap.to(controls.target,{x:e*STEP/2,y:0,z:e*STEP/2,duration:1.5,ease:"power2.out"})}document.getElementById("btn-plus").onclick=()=>{n<10&&(n++,refresh())},document.getElementById("btn-minus").onclick=()=>{n>1&&(n--,refresh())},document.getElementById("distribute-btn").onclick=toggleAction,document.getElementById("reset-view-btn").onclick=resetCam;function refresh(){document.getElementById("n-value").innerText=`n=${n}`,rebuild()}window.onresize=()=>{const e=document.querySelector(".canvas-container");renderer.setSize(e.clientWidth,e.clientHeight),camera.aspect=e.clientWidth/e.clientHeight,camera.updateProjectionMatrix()},initScene();
