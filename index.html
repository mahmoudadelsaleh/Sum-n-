<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>متطابقة المكعبات | Mahmoud Adel Saleh</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#02050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #02050a;
            font-family: system-ui, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; color: white;
        }
        .header { flex-shrink: 0; padding: 15px 10px; text-align: center; z-index: 10; }
        .math-panel {
            background: rgba(10, 20, 35, 0.95);
            backdrop-filter: blur(15px);
            display: inline-block;
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        #math-formula-block { font-size: 1rem; color: #f5e6b0; min-height: 45px; }
        .canvas-container {
            flex: 1; position: relative; margin: 0 10px;
            border-radius: 30px; overflow: hidden;
            background: radial-gradient(circle at center, #0a111f 0%, #02050a 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        /* رفع وتنسيق منطقة الأزرار */
        .footer-bar {
            flex-shrink: 0;
            background: linear-gradient(to top, #02050a, #080d1a);
            z-index: 100;
            padding: 25px 10px 45px 10px; /* زيادة التباعد السفلي لرفع الأزرار */
        }
        .controls {
            display: flex; gap: 20px; justify-content: center; align-items: center;
        }
        button {
            background: #162235; border: 1px solid #2c3e50; color: #ffd700;
            border-radius: 18px; min-width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button:active { transform: scale(0.85); }
        .btn-action { 
            background: linear-gradient(135deg, #ffd700, #daa520); 
            color: #000; border: none; min-width: 80px; 
        }
        .n-value { color: #fff; font-size: 1.4rem; min-width: 70px; text-align: center; font-weight: 900; }
        .watermark { 
            position: absolute; bottom: 20px; left: 25px; 
            color: rgba(255, 215, 0, 0.35); font-size: 0.75rem; 
            pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="math-panel">
            <div id="math-formula-block"></div>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
        <div class="watermark">E-LEARNING STUDIO | <b>MAHMOUD ADEL SALEH</b></div>
    </div>

    <div class="footer-bar">
        <div class="controls">
            <button id="btn-minus">n-</button>
            <div class="n-value" id="n-value">n=4</div>
            <button id="btn-plus">n+</button>
            
            <button id="distribute-btn" class="btn-action" title="بدء العرض">
                <svg id="action-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"></svg>
            </button>
            
            <button id="reset-view-btn" title="توسيط الكاميرا">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls, mainGroup;
        let n = 4, allCubes = [], isAnimating = false, isDistributed = false;

        function updateMathFormula() {
            const sumN = (n * (n + 1)) / 2;
            const res = Math.pow(sumN, 2);
            const container = document.getElementById('math-formula-block');
            container.innerHTML = `$$\\small \\sum_{i=1}^{${n}} i^3 = \\left( \\sum_{i=1}^{${n}} i \\right)^2 = ${sumN}^2 = ${res}$$`;
            if (window.MathJax) MathJax.typesetPromise([container]);
        }

        function initScene() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(15, 30, 20);
            scene.add(sun);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            rebuild();
            resetCam();
            updateIcon();
            
            renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
        }

        function rebuild() {
            if (isAnimating) return;
            while(mainGroup.children.length) mainGroup.remove(mainGroup.children[0]);
            allCubes = [];
            isDistributed = false;
            updateIcon();

            const totalS = (n * (n + 1)) / 2;
            const globalUsed = Array(totalS).fill().map(() => Array(totalS).fill(false));

            for (let i = 1; i <= n; i++) {
                let offset = (i * (i - 1)) / 2;
                const hue = (i * 137.5) % 360; 
                
                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        globalUsed[offset + x][offset + z] = true;
                    }
                }

                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        for (let y = 0; y < i; y++) {
                            const cube = new THREE.Mesh(
                                new THREE.BoxGeometry(0.95, 0.95, 0.95),
                                new THREE.MeshPhysicalMaterial({ 
                                    color: new THREE.Color(`hsl(${hue}, 80%, 55%)`), 
                                    metalness: 0.2, roughness: 0.2, clearcoat: 0.5 
                                })
                            );
                            
                            const px = offset + x, py = y, pz = offset + z;
                            let tx = px, tz = pz;

                            if (y > 0) {
                                let found = false;
                                for(let rz=0; rz < totalS && !found; rz++) {
                                    for(let rx=0; rx < totalS && !found; rx++) {
                                        if(!globalUsed[rx][rz]) {
                                            globalUsed[rx][rz] = true; tx = rx; tz = rz; found = true;
                                        }
                                    }
                                }
                            }

                            cube.position.set(px, py, pz);
                            cube.userData = { orig: new THREE.Vector3(px, py, pz), target: new THREE.Vector3(tx, 0, tz), towerId: i };
                            mainGroup.add(cube);
                            allCubes.push(cube);
                        }
                    }
                }
            }
            updateMathFormula();
            controls.target.set(totalS/2, 0, totalS/2);
        }

        async function toggleAction() {
            if (isAnimating) return;
            isAnimating = true;
            
            // تفعيل الشاشة الكاملة عند بدء الحركة
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            if (!isDistributed) {
                // سرعة توزيع بطيئة ومنتظمة
                for (let tId = 1; tId <= n; tId++) {
                    const tower = allCubes.filter(c => c.userData.towerId === tId);
                    tower.forEach(c => {
                        gsap.to(c.position, { 
                            x: c.userData.target.x, y: c.userData.target.y, z: c.userData.target.z, 
                            duration: 1.5, // مدة حركة أبطأ
                            ease: "power2.inOut" 
                        });
                    });
                    await new Promise(r => setTimeout(r, 600)); // فاصل زمني أكبر بين الأبراج
                }
                isDistributed = true;
            } else {
                // تجميع بطيء وممتع
                allCubes.forEach(c => {
                    gsap.to(c.position, { 
                        x: c.userData.orig.x, y: c.userData.orig.y, z: c.userData.orig.z, 
                        duration: 1.8, ease: "expo.out", delay: Math.random() * 0.5 
                    });
                });
                await new Promise(r => setTimeout(r, 2200));
                isDistributed = false;
            }
            updateIcon(); isAnimating = false;
        }

        function updateIcon() {
            const icon = document.getElementById('action-icon');
            icon.innerHTML = isDistributed ? '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"></path>' : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor"></path><circle cx="12" cy="12" r="3" stroke="currentColor"></circle>';
        }

        function resetCam() {
            const S = (n * (n + 1)) / 2;
            gsap.to(camera.position, { x: S*2.5, y: S*2, z: S*2.5, duration: 1.8, ease: "power2.out" });
            gsap.to(controls.target, { x: S/2, y: 0, z: S/2, duration: 1.8, ease: "power2.out" });
        }

        document.getElementById('btn-plus').onclick = () => { if(n<10){ n++; refresh(); } };
        document.getElementById('btn-minus').onclick = () => { if(n>1){ n--; refresh(); } };
        document.getElementById('distribute-btn').onclick = toggleAction;
        document.getElementById('reset-view-btn').onclick = resetCam;
        function refresh() { document.getElementById('n-value').innerText = `n=${n}`; rebuild(); }
        window.onresize = () => {
            const c = document.querySelector('.canvas-container');
            renderer.setSize(c.clientWidth, c.clientHeight);
            camera.aspect = c.clientWidth/c.clientHeight; camera.updateProjectionMatrix();
        };
        initScene();
    </script>
</body>
</html>
