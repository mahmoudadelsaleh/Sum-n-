<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>متطابقة المكعبات | م. محمود عادل</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #02050a;
            font-family: system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header { flex-shrink: 0; padding: 5px; text-align: center; }
        .math-panel {
            background: rgba(10, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 8px 18px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #math-formula-block { font-size: 0.85rem; color: #f5e6b0; }
        .canvas-container {
            flex: 1; 
            position: relative;
            margin: 0 5px;
            border-radius: 20px;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a111f 0%, #02050a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        /* تعديل منطقة الأزرار لرفعها للأعلى قليلاً */
        .footer-bar {
            flex-shrink: 0;
            background: #080d1a;
            border-top: 1px solid #1a253a;
            z-index: 100;
            padding-bottom: 25px; /* رفع الأزرار من الأسفل */
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            padding: 20px 5px 10px 5px; /* زيادة التباعد العلوي */
        }
        button {
            background: #162235;
            border: 1px solid #2c3e50;
            color: #ffd700;
            border-radius: 12px;
            min-width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        button:disabled { opacity: 0.2; }
        button:active { transform: scale(0.9); }
        .btn-action { background: linear-gradient(135deg, #ffd700, #daa520); color: #000; border: none; }
        .n-value { color: #fff; font-size: 1rem; min-width: 50px; text-align: center; font-weight: 900; }
        
        /* حاجز إضافي لأجهزة الآيفون والاندرويد الحديثة */
        .safe-area-buffer { height: 15px; background: #080d1a; }
        
        .watermark { position: absolute; bottom: 12px; left: 15px; color: rgba(255, 215, 0, 0.3); font-size: 0.65rem; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="math-panel">
            <div id="math-formula-block"></div>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
        <div class="watermark">E-Learning Studio | <b>Mr. Mahmoud Adel</b></div>
    </div>

    <div class="footer-bar">
        <div class="controls">
            <button id="btn-minus">n-</button>
            <div class="n-value" id="n-value">n=4</div>
            <button id="btn-plus">n+</button>
            
            <button id="distribute-btn" class="btn-action">
                <svg id="action-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            
            <button id="reset-view-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
        <div class="safe-area-buffer"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls, mainGroup, gridHelper;
        let n = 4;
        let allCubes = [];
        const STEP = 1.0;
        let isAnimating = false;
        let isDistributed = false;

        function updateMathFormula() {
            const sumN = (n * (n + 1)) / 2;
            const res = Math.pow(sumN, 2);
            const container = document.getElementById('math-formula-block');
            const latex = `$$\\small \\sum_{i=1}^{${n}} i^3 = \\left( \\sum_{i=1}^{${n}} i \\right)^2 = ${sumN}^2 = ${res}$$`;
            container.innerHTML = latex;
            if (window.MathJax) MathJax.typesetPromise([container]);
        }

        function initScene() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;

            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 25, 15);
            scene.add(sun);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            rebuild();
            resetCam();
            updateIcon();
            
            renderer.setAnimationLoop(() => {
                controls.update();
                renderer.render(scene, camera);
            });
        }

        function updateGrid() {
            if (gridHelper) scene.remove(gridHelper);
            const S = (n * (n + 1)) / 2;
            gridHelper = new THREE.GridHelper(S * 2, S, 0xffd700, 0x111111);
            gridHelper.position.set((S * STEP) / 2 - 0.5, -0.52, (S * STEP) / 2 - 0.5);
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
        }

        function rebuild() {
            if (isAnimating) return;
            while(mainGroup.children.length) mainGroup.remove(mainGroup.children[0]);
            allCubes = [];
            isDistributed = false;
            updateIcon();

            const totalS = (n * (n + 1)) / 2;
            const globalUsed = Array(totalS).fill().map(() => Array(totalS).fill(false));

            for (let i = 1; i <= n; i++) {
                let offset = (i * (i - 1)) / 2;
                const hue = (i * 137.5) % 360; 
                
                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        globalUsed[offset + x][offset + z] = true;
                    }
                }

                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        for (let y = 0; y < i; y++) {
                            const material = new THREE.MeshPhysicalMaterial({
                                color: new THREE.Color(`hsl(${hue}, 85%, 55%)`),
                                metalness: 0.15, roughness: 0.25, clearcoat: 1.0
                            });

                            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.95, 0.95), material);
                            const edges = new THREE.EdgesGeometry(cube.geometry);
                            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 }));
                            cube.add(line);

                            const px = (offset + x) * STEP;
                            const py = y * STEP;
                            const pz = (offset + z) * STEP;
                            
                            let targetX = px, targetZ = pz;
                            if (y > 0) {
                                const currentMaxS = (i * (i + 1)) / 2;
                                let found = false;
                                for(let rz=0; rz < currentMaxS && !found; rz++) {
                                    for(let rx=0; rx < currentMaxS && !found; rx++) {
                                        if(!globalUsed[rx][rz]) {
                                            globalUsed[rx][rz] = true;
                                            targetX = rx * STEP;
                                            targetZ = rz * STEP;
                                            found = true;
                                        }
                                    }
                                }
                            }

                            cube.position.set(px, py, pz);
                            cube.userData = { orig: new THREE.Vector3(px, py, pz), target: new THREE.Vector3(targetX, 0, targetZ), towerId: i };
                            mainGroup.add(cube);
                            allCubes.push(cube);
                        }
                    }
                }
            }
            updateMathFormula();
            updateGrid();
            const S = (n * (n + 1)) / 2;
            const center = (S * STEP) / 2;
            controls.target.set(center, 0, center);
        }

        async function toggleAction() {
            if (isAnimating) return;
            isAnimating = true;
            const btn = document.getElementById('distribute-btn');
            btn.disabled = true;

            if (!isDistributed) {
                for (let tId = 1; tId <= n; tId++) {
                    const towerCubes = allCubes.filter(c => c.userData.towerId === tId);
                    towerCubes.forEach(c => {
                        gsap.to(c.position, {
                            x: c.userData.target.x, y: c.userData.target.y, z: c.userData.target.z,
                            duration: 0.9, ease: "power3.inOut"
                        });
                    });
                    await new Promise(r => setTimeout(r, 350));
                }
                isDistributed = true;
            } else {
                allCubes.forEach(c => {
                    gsap.to(c.position, {
                        x: c.userData.orig.x, y: c.userData.orig.y, z: c.userData.orig.z,
                        duration: 1.1, ease: "back.inOut(1.1)", delay: Math.random() * 0.3
                    });
                });
                await new Promise(r => setTimeout(r, 1500));
                isDistributed = false;
            }

            updateIcon();
            isAnimating = false;
            btn.disabled = false;
        }

        function updateIcon() {
            const icon = document.getElementById('action-icon');
            if (isDistributed) {
                icon.innerHTML = '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>';
            } else {
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function resetCam() {
            const S = (n * (n + 1)) / 2;
            const center = (S * STEP) / 2;
            gsap.to(camera.position, { x: S*2.6, y: S*2, z: S*2.6, duration: 1.5, ease: "power2.out" });
            gsap.to(controls.target, { x: center, y: 0, z: center, duration: 1.5, ease: "power2.out" });
        }

        document.getElementById('btn-plus').onclick = () => { if(n<10){ n++; refresh(); } };
        document.getElementById('btn-minus').onclick = () => { if(n>1){ n--; refresh(); } };
        document.getElementById('distribute-btn').onclick = toggleAction;
        document.getElementById('reset-view-btn').onclick = resetCam;

        function refresh() {
            document.getElementById('n-value').innerText = `n=${n}`;
            rebuild();
        }

        window.onresize = () => {
            const c = document.querySelector('.canvas-container');
            renderer.setSize(c.clientWidth, c.clientHeight);
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
        };

        initScene();
    </script>
</body>
</html>
