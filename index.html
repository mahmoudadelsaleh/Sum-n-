<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>متطابقة المكعبات | م. محمود عادل</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#02050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #02050a;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }
        /* تنبيه الأوفلاين */
        #offline-status {
            position: fixed;
            top: 0; width: 100%;
            background: #ffd700; color: #000;
            text-align: center; font-size: 0.8rem; font-weight: bold;
            padding: 4px; display: none; z-index: 9999;
        }
        .header { flex-shrink: 0; padding: 10px; text-align: center; z-index: 10; }
        .math-panel {
            background: rgba(10, 20, 35, 0.9);
            backdrop-filter: blur(15px);
            display: inline-block;
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #math-formula-block { font-size: 0.9rem; color: #f5e6b0; min-height: 40px; }
        .canvas-container {
            flex: 1;
            position: relative;
            margin: 0 10px;
            border-radius: 25px;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a111f 0%, #02050a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #canvas3d { width: 100%; height: 100%; display: block; }
        .footer-bar {
            flex-shrink: 0;
            background: #080d1a;
            border-top: 1px solid #1a253a;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 25px);
        }
        .controls {
            display: flex; gap: 15px; justify-content: center; align-items: center; padding: 20px 10px;
        }
        button {
            background: #162235; border: 1px solid #2c3e50; color: #ffd700;
            border-radius: 15px; min-width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button:active { transform: scale(0.9); background: #1c2d45; }
        .btn-action { background: linear-gradient(135deg, #ffd700, #daa520); color: #000; border: none; min-width: 70px; }
        .n-value { color: #fff; font-size: 1.2rem; min-width: 60px; text-align: center; font-weight: 900; }
        .watermark { position: absolute; bottom: 15px; left: 20px; color: rgba(255, 215, 0, 0.3); font-size: 0.7rem; pointer-events: none; }
    </style>
</head>
<body>

    <div id="offline-status">أنت تعمل الآن في وضع الأوفلاين (بدون إنترنت)</div>

    <div class="header">
        <div class="math-panel">
            <div id="math-formula-block">جاري تحميل المعادلة...</div>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
        <div class="watermark">E-LEARNING STUDIO | <b>MR. MAHMOUD ADEL</b></div>
    </div>

    <div class="footer-bar">
        <div class="controls">
            <button id="btn-minus">n-</button>
            <div class="n-value" id="n-value">n=4</div>
            <button id="btn-plus">n+</button>
            
            <button id="distribute-btn" class="btn-action">
                <svg id="action-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
            
            <button id="reset-view-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls, mainGroup, gridHelper;
        let n = 4;
        let allCubes = [];
        let isAnimating = false;
        let isDistributed = false;

        // 1. تسجيل الـ Service Worker للعمل أوفلاين
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
            });
        }

        // مراقبة حالة الإنترنت
        window.addEventListener('offline', () => document.getElementById('offline-status').style.display = 'block');
        window.addEventListener('online', () => document.getElementById('offline-status').style.display = 'none');

        function updateMathFormula() {
            const sumN = (n * (n + 1)) / 2;
            const res = Math.pow(sumN, 2);
            const container = document.getElementById('math-formula-block');
            container.innerHTML = `$$\\small \\sum_{i=1}^{${n}} i^3 = \\left( \\sum_{i=1}^{${n}} i \\right)^2 = ${sumN}^2 = ${res}$$`;
            if (window.MathJax) MathJax.typesetPromise([container]);
        }

        function initScene() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            
            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 15);
            scene.add(sun);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            rebuild();
            resetCam();
            updateIcon();
            
            renderer.setAnimationLoop(() => {
                controls.update();
                renderer.render(scene, camera);
            });
        }

        function rebuild() {
            if (isAnimating) return;
            while(mainGroup.children.length) mainGroup.remove(mainGroup.children[0]);
            allCubes = [];
            isDistributed = false;
            updateIcon();

            const totalS = (n * (n + 1)) / 2;
            const globalUsed = Array(totalS).fill().map(() => Array(totalS).fill(false));

            for (let i = 1; i <= n; i++) {
                let offset = (i * (i - 1)) / 2;
                const color = new THREE.Color(`hsl(${(i * 137.5) % 360}, 80%, 60%)`);
                
                // تحديد مربعات القاعدة لهذا المكعب الكبير
                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        globalUsed[offset + x][offset + z] = true;
                    }
                }

                for (let x = 0; x < i; x++) {
                    for (let z = 0; z < i; z++) {
                        for (let y = 0; y < i; y++) {
                            const cube = new THREE.Mesh(
                                new THREE.BoxGeometry(0.95, 0.95, 0.95),
                                new THREE.MeshPhysicalMaterial({ color, metalness: 0.1, roughness: 0.2, clearcoat: 1 })
                            );

                            const px = (offset + x);
                            const py = y;
                            const pz = (offset + z);
                            
                            let tx = px, tz = pz;
                            if (y > 0) { // البحث عن مكان فارغ في القاعدة عند التوزيع
                                let found = false;
                                for(let rz=0; rz<totalS && !found; rz++) {
                                    for(let rx=0; rx<totalS && !found; rx++) {
                                        if(!globalUsed[rx][rz]) {
                                            globalUsed[rx][rz] = true; tx = rx; tz = rz; found = true;
                                        }
                                    }
                                }
                            }

                            cube.position.set(px, py, pz);
                            cube.userData = { orig: new THREE.Vector3(px, py, pz), target: new THREE.Vector3(tx, 0, tz), towerId: i };
                            mainGroup.add(cube);
                            allCubes.push(cube);
                        }
                    }
                }
            }
            updateMathFormula();
            controls.target.set(totalS/2, 0, totalS/2);
        }

        async function toggleAction() {
            if (isAnimating) return;
            isAnimating = true;
            if (!isDistributed) {
                for (let tId = 1; tId <= n; tId++) {
                    allCubes.filter(c => c.userData.towerId === tId).forEach(c => {
                        gsap.to(c.position, { x: c.userData.target.x, y: c.userData.target.y, z: c.userData.target.z, duration: 0.8 });
                    });
                    await new Promise(r => setTimeout(r, 150));
                }
                isDistributed = true;
            } else {
                allCubes.forEach(c => {
                    gsap.to(c.position, { x: c.userData.orig.x, y: c.userData.orig.y, z: c.userData.orig.z, duration: 1, ease: "back.out" });
                });
                await new Promise(r => setTimeout(r, 1100));
                isDistributed = false;
            }
            updateIcon();
            isAnimating = false;
        }

        function updateIcon() {
            const icon = document.getElementById('action-icon');
            icon.innerHTML = isDistributed ? 
                '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>' : 
                '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }

        function resetCam() {
            const S = (n * (n + 1)) / 2;
            gsap.to(camera.position, { x: S*2.5, y: S*2, z: S*2.5, duration: 1.2 });
        }

        document.getElementById('btn-plus').onclick = () => { if(n<10){ n++; refresh(); } };
        document.getElementById('btn-minus').onclick = () => { if(n>1){ n--; refresh(); } };
        document.getElementById('distribute-btn').onclick = toggleAction;
        document.getElementById('reset-view-btn').onclick = resetCam;

        function refresh() {
            document.getElementById('n-value').innerText = `n=${n}`;
            rebuild();
        }

        window.onresize = () => {
            const c = document.querySelector('.canvas-container');
            renderer.setSize(c.clientWidth, c.clientHeight);
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
        };

        initScene();
    </script>
</body>
</html>
