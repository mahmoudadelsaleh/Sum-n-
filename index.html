<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>متطابقة المكعبات | Mahmoud Adel Saleh</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#02050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #02050a;
            font-family: system-ui, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; color: white;
        }
        .header { flex-shrink: 0; padding: 10px; text-align: center; z-index: 10; }
        .math-panel {
            background: rgba(10, 20, 35, 0.95);
            backdrop-filter: blur(15px);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        #math-formula-block { font-size: 0.85rem; color: #f5e6b0; min-height: 40px; }
        
        .canvas-container {
            flex: 1; position: relative; 
            margin: 0 15px;
            border-radius: 25px; overflow: hidden;
            background: radial-gradient(circle at center, #0a111f 0%, #02050a 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        .footer-bar {
            flex-shrink: 0;
            width: calc(100% - 30px);
            margin: 15px auto 35px auto;
            z-index: 100;
        }
        .controls {
            display: flex; 
            gap: 10px; 
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 13, 26, 0.85);
            padding: 10px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        button {
            background: #162235; border: 1px solid #2c3e50; color: #ffd700;
            border-radius: 14px; 
            flex: 1;
            max-width: 52px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-action { 
            background: linear-gradient(135deg, #ffd700, #daa520); 
            color: #000; border: none; 
            max-width: 65px;
        }
        .n-value { color: #fff; font-size: 1.1rem; flex: 1; text-align: center; font-weight: 900; }
        .watermark { 
            position: absolute; bottom: 15px; left: 20px; 
            color: rgba(255, 215, 0, 0.3); font-size: 0.65rem; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="math-panel">
            <div id="math-formula-block"></div>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
        <div class="watermark">E-LEARNING STUDIO | <b>MAHMOUD ADEL SALEH</b></div>
    </div>

    <div class="footer-bar">
        <div class="controls">
            <button id="btn-minus">n-</button>
            <div class="n-value" id="n-value">n=4</div>
            <button id="btn-plus">n+</button>
            <button id="distribute-btn" class="btn-action">
                <svg id="action-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"></svg>
            </button>
            <button id="reset-view-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls, mainGroup;
        let n = 4, allCubes = [], isAnimating = false, isDistributed = false;

        function updateMathFormula() {
            const sumN = (n * (n + 1)) / 2;
            const res = Math.pow(sumN, 2);
            const container = document.getElementById('math-formula-block');
            container.innerHTML = `$$\\small \\sum_{i=1}^{${n}} i^3 = \\left( \\frac{${n}(${n}+1)}{2} \\right)^2 = ${res}$$`;
            if (window.MathJax) MathJax.typesetPromise([container]);
        }

        function initScene() {
            const canvas = document.getElementById('canvas3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(15, 30, 20);
            scene.add(sun);
            mainGroup = new THREE.Group();
            scene.add(mainGroup);
            rebuild();
            resetCam();
            updateIcon();
            renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
        }

        function rebuild() {
            if (isAnimating) return;
            while(mainGroup.children.length) mainGroup.remove(mainGroup.children[0]);
            allCubes = [];
            isDistributed = false;
            updateIcon();

            for (let k = 1; k <= n; k++) {
                const hue = (k * 137.5) % 360;
                const prevS = (k * (k - 1)) / 2; // ضلع المربع السابق
                const towerOffset = prevS;

                for (let y = 0; y < k; y++) {
                    for (let x = 0; x < k; x++) {
                        for (let z = 0; z < k; z++) {
                            const cube = new THREE.Mesh(
                                new THREE.BoxGeometry(0.95, 0.95, 0.95),
                                new THREE.MeshPhysicalMaterial({ color: new THREE.Color(`hsl(${hue}, 80%, 55%)`), metalness: 0.2, roughness: 0.2, clearcoat: 0.5 })
                            );

                            const px = (towerOffset + x), py = y, pz = (towerOffset + z);
                            
                            // الحساب الهندسي الصرف لموضع التوزيع (L-Shape)
                            let tx, tz;
                            if (y === 0) {
                                tx = px; tz = pz; // القاعدة تظل مكانها
                            } else {
                                // توزيع الطبقات العليا لملء الفراغ حول المربع k-1
                                // نستخدم y كمعامل لملء الجوانب
                                if (y % 2 === 1) {
                                    tx = x;
                                    tz = prevS + (Math.floor(y/2) * k) + z;
                                } else {
                                    tx = prevS + (Math.floor(y/2 - 1) * k) + x;
                                    tz = z;
                                }
                            }

                            cube.position.set(px, py, pz);
                            cube.userData = { orig: new THREE.Vector3(px, py, pz), target: new THREE.Vector3(tx, 0, tz), towerId: k };
                            mainGroup.add(cube);
                            allCubes.push(cube);
                        }
                    }
                }
            }
            updateMathFormula();
            const S = (n * (n + 1)) / 2;
            controls.target.set(S/2, 0, S/2);
        }

        async function toggleAction() {
            if (isAnimating) return;
            isAnimating = true;
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});

            if (!isDistributed) {
                for (let tId = 1; tId <= n; tId++) {
                    allCubes.filter(c => c.userData.towerId === tId).forEach(c => {
                        gsap.to(c.position, { x: c.userData.target.x, y: c.userData.target.y, z: c.userData.target.z, duration: 1.6, ease: "power2.inOut" });
                    });
                    await new Promise(r => setTimeout(r, 650));
                }
                isDistributed = true;
            } else {
                allCubes.forEach(c => {
                    gsap.to(c.position, { x: c.userData.orig.x, y: c.userData.orig.y, z: c.userData.orig.z, duration: 1.8, ease: "expo.out", delay: Math.random() * 0.4 });
                });
                await new Promise(r => setTimeout(r, 2200));
                isDistributed = false;
            }
            updateIcon(); isAnimating = false;
        }

        function updateIcon() {
            const icon = document.getElementById('action-icon');
            icon.innerHTML = isDistributed ? '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"></path>' : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor"></path><circle cx="12" cy="12" r="3" stroke="currentColor"></circle>';
        }

        function resetCam() {
            const S = (n * (n + 1)) / 2;
            gsap.to(camera.position, { x: S*2.5, y: S*2, z: S*2.5, duration: 1.8, ease: "power2.out" });
            gsap.to(controls.target, { x: S/2, y: 0, z: S/2, duration: 1.8, ease: "power2.out" });
        }

        document.getElementById('btn-plus').onclick = () => { if(n<10){ n++; refresh(); } };
        document.getElementById('btn-minus').onclick = () => { if(n>1){ n--; refresh(); } };
        document.getElementById('distribute-btn').onclick = toggleAction;
        document.getElementById('reset-view-btn').onclick = resetCam;
        function refresh() { document.getElementById('n-value').innerText = `n=${n}`; rebuild(); }
        window.onresize = () => {
            const c = document.querySelector('.canvas-container');
            renderer.setSize(c.clientWidth, c.clientHeight);
            camera.aspect = c.clientWidth/c.clientHeight; camera.updateProjectionMatrix();
        };
        initScene();
    </script>
</body>
</html>
